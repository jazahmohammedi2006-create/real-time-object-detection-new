<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Reservation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>Create Reservation</h1>
  <nav>
    <a href="index.html">Overview</a>
    <a href="spots.html">Spot Finder</a>
    <a href="reservation.html">Reservation</a>
    <a href="history.html">History</a>
    <a href="reports.html">Reports</a>
  </nav>
</header>
<main>
  <div class="card">
    <h2>New Reservation Form</h2>
    <input id="customerId" placeholder="Customer ID" type="number" />
    <input id="vehicleId" placeholder="Vehicle ID" type="number" />
    <input id="spotId" placeholder="Spot ID" type="number" />
    <input id="fromTime" type="datetime-local" />
    <input id="toTime" type="datetime-local" />
    <button onclick="submitReservation()">Reserve</button>
    <p id="message"></p>
  </div>
</main>
<script src="app.js"></script>
<script>
async function submitReservation() {
  const payload = {
    customer_id: Number(document.getElementById('customerId').value),
    vehicle_id: Number(document.getElementById('vehicleId').value),
    spot_id: Number(document.getElementById('spotId').value),
    reserved_from: document.getElementById('fromTime').value.replace('T', ' ') + ':00',
    reserved_to: document.getElementById('toTime').value.replace('T', ' ') + ':00'
  };

  try {
    const data = await fetchJSON('/api/reservations', {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    document.getElementById('message').textContent = `Reservation created: #${data.reservation_id}`;
  } catch (e) {
    document.getElementById('message').textContent = `Error: ${e.message}`;
  }
}
</script>
</body>
</html>
