<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>Analytics Reports</h1>
  <nav>
    <a href="index.html">Overview</a>
    <a href="spots.html">Spot Finder</a>
    <a href="reservation.html">Reservation</a>
    <a href="history.html">History</a>
    <a href="reports.html">Reports</a>
  </nav>
</header>
<main>
  <div class="card"><h2>Revenue by Day</h2><div id="revenue"></div></div>
  <div class="card"><h2>Top Customers</h2><div id="topCustomers"></div></div>
  <div class="card"><h2>Spot Utilization</h2><div id="spotUtil"></div></div>
  <div class="card"><h2>Reservation Status Mix</h2><div id="statusMix"></div></div>
</main>
<script src="app.js"></script>
<script>
fetchJSON('/api/reports/revenue').then(data => renderTable(document.getElementById('revenue'), data));
fetchJSON('/api/reports/top-customers').then(data => renderTable(document.getElementById('topCustomers'), data));
fetchJSON('/api/reports/spot-utilization').then(data => renderTable(document.getElementById('spotUtil'), data));
fetchJSON('/api/reports/reservation-status').then(data => renderTable(document.getElementById('statusMix'), data));
</script>
</body>
</html>
